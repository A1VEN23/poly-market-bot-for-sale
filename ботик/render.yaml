services:
  - type: web
    name: polik-bott
    runtime: docker
    plan: free
    healthCheckPath: /health
    # Render allows up to 300 s for the first health-check after deploy.
    # With a single-worker uvicorn the bot is ready in < 15 s normally.
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: METACULUS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CRYPTO_BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: DATABASE_PATH
        value: /tmp/polymarket_bot.db
      - key: PORT
        value: 10000
      # Memory-conscious signal filters
      - key: MIN_VOLUME_24H
        value: "1000"
      - key: MAX_SPREAD_PERCENT
        value: "30"
      - key: MIN_PROFIT_PERCENT
        value: "3"
