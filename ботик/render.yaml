services:
  - type: web
    name: polik-bott
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: METACULUS_API_KEY
        sync: false
      - key: CRYPTO_BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: polymarket-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: polymarket-db
    plan: free